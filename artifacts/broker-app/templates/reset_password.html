<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrokerApp — Set New Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f6fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: #1a56db;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .logo-text h1 { font-size: 22px; font-weight: 700; color: #1a202c; }
    .logo-text p { font-size: 13px; color: #6b7280; margin-top: 2px; }
    h2 { font-size: 18px; font-weight: 700; color: #1a202c; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      border: 1.5px solid #e4e8f0;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      background: #f3f6fb;
      color: #1a202c;
    }
    .form-group input:focus { border-color: #1a56db; background: #fff; }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .success-box {
      background: #d1fae5;
      color: #065f46;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .btn {
      width: 100%;
      background: #1a56db;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #1340b0; }
    .btn:disabled { background: #93aee8; cursor: not-allowed; }
    #loading { display: none; text-align: center; color: #6b7280; font-size: 14px; padding: 20px 0; }
    #invalid { display: none; }
    #invalid .error-msg { display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #1a56db;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏠</div>
      <div class="logo-text">
        <h1>BrokerApp</h1>
        <p>Property Management Dashboard</p>
      </div>
    </div>

    <div id="loading">Verifying reset link…</div>

    <div id="invalid" style="display:none">
      <div class="error-msg">This reset link is invalid or has expired. Please request a new one.</div>
      <a class="back-link" href="/forgot-password">Request a new link</a>
    </div>

    <div id="reset-form" style="display:none">
      <h2>Set a new password</h2>
      <div id="form-error" class="error-msg" style="display:none"></div>
      <div id="form-success" class="success-box" style="display:none">
        Password updated! Redirecting to sign in…
      </div>
      <form id="resetForm" onsubmit="doReset(event)">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="pwd" placeholder="Min. 6 characters" required />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="pwd2" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn" id="resetBtn">Set New Password</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "{{ supabase_url }}";
    const SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("loading").style.display = "block";

    async function init() {
      const hash = window.location.hash;
      if (!hash.includes("access_token") && !hash.includes("type=recovery")) {
        const params = new URLSearchParams(window.location.search);
        if (!params.get("code") && !params.get("token")) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("invalid").style.display = "block";
          return;
        }
      }
      const { data, error } = await sb.auth.getSession();
      document.getElementById("loading").style.display = "none";
      if (error || !data.session) {
        document.getElementById("invalid").style.display = "block";
      } else {
        document.getElementById("reset-form").style.display = "block";
      }
    }

    async function doReset(e) {
      e.preventDefault();
      const pwd = document.getElementById("pwd").value;
      const pwd2 = document.getElementById("pwd2").value;
      const errEl = document.getElementById("form-error");
      errEl.style.display = "none";

      if (pwd.length < 6) {
        errEl.textContent = "Password must be at least 6 characters.";
        errEl.style.display = "block";
        return;
      }
      if (pwd !== pwd2) {
        errEl.textContent = "Passwords do not match.";
        errEl.style.display = "block";
        return;
      }

      const btn = document.getElementById("resetBtn");
      btn.disabled = true;
      btn.textContent = "Updating…";

      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Set New Password";
      } else {
        document.getElementById("resetForm").style.display = "none";
        document.getElementById("form-success").style.display = "block";
        setTimeout(() => window.location.href = "/login", 2500);
      }
    }

    init();
  </script>
</body>
</html>
