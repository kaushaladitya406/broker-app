<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrokerApp</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🏠</div>
    <div>
      <div style="font-size:18px;font-weight:700;">BrokerApp</div>
      <div class="header-sub">Property Management Dashboard</div>
    </div>
  </div>
  <button class="add-btn-header" onclick="openAddModal()">+ Add Property</button>
</header>

<main>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">🏘️</div>
      <div>
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div>
        <div class="stat-label">Available</div>
        <div class="stat-value" id="statAvailable">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">🔑</div>
      <div>
        <div class="stat-label">Sold</div>
        <div class="stat-value" id="statSold">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">💰</div>
      <div>
        <div class="stat-label">Avg Price</div>
        <div class="stat-value" id="statAvgPrice">—</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">📋 Property Inventory</div>
      <div class="filters-row">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search by location or type..."
        />
        <select id="typeFilter" class="filter-select">
          <option value="">All Types</option>
          <option>Apartment</option>
          <option>House</option>
          <option>Villa</option>
          <option>Office</option>
          <option>Shop</option>
          <option>Land</option>
          <option>Warehouse</option>
        </select>
        <select id="statusFilter" class="filter-select">
          <option value="">All Status</option>
          <option>Available</option>
          <option>Reserved</option>
          <option>Sold</option>
          <option>Rented</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Location</th>
            <th>Size</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="propertiesBody">
          <tr><td colspan="6" class="empty-row">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="whatsapp-section">
      <div class="whatsapp-header">
        <div class="whatsapp-icon">💬</div>
        <div>
          <h2>AI Property Matcher</h2>
          <p>Paste a WhatsApp message and AI will find matching properties</p>
        </div>
      </div>

      <textarea
        id="whatsappMsg"
        placeholder="Paste a client's WhatsApp message here...
Example: 'Hi, I'm looking for a 3-bedroom apartment in downtown, budget around $200,000, preferably available immediately'"
      ></textarea>

      <button class="match-btn" id="matchBtn" onclick="matchProperties()">
        🔍 Find Matches
      </button>

      <div id="matchResult"></div>
    </div>
  </div>

</main>

<div class="modal-overlay" id="propModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Property</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form id="propForm">
      <div class="modal-body">
        <div class="form-group">
          <label>Property Type</label>
          <select id="propType" required>
            <option value="" disabled selected>Select type...</option>
            <option>Apartment</option>
            <option>House</option>
            <option>Villa</option>
            <option>Office</option>
            <option>Shop</option>
            <option>Land</option>
            <option>Warehouse</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="propLocation" placeholder="e.g. Downtown, City Center..." required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Size (sqm)</label>
            <input type="number" id="propSize" placeholder="e.g. 120" min="1" required />
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" id="propPrice" placeholder="e.g. 250000" min="0" required />
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="propStatus" required>
            <option value="Available">Available</option>
            <option value="Reserved">Reserved</option>
            <option value="Sold">Sold</option>
            <option value="Rented">Rented</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Save Property</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
